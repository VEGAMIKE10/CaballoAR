<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{

    margin:0;
    overflow:hidden;

}

model-viewer{

    width:100vw;
    height:100vh;

}

#ar-button{

    background-color:white;

    border-radius:8px;

    border:1px solid black;

    position:absolute;

    bottom:30px;

    left:50%;

    transform:translateX(-50%);

    padding:20px 30px;

    font-size:22px;

    font-weight:bold;

}

</style>

</head>

<body>

<model-viewer

src="modelocaballo3dconejes.glb"

ar

ar-modes="webxr scene-viewer"

camera-controls

auto-rotate

>

<button slot="ar-button" id="ar-button">

Ver en AR

</button>

</model-viewer>

</body>

</html>
